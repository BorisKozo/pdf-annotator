<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF Annotator</title>
    <style>
      @font-face {
        font-family: 'Noto Sans Hebrew';
        src: url('/fonts/NotoSansHebrew-VF.ttf') format('truetype');
        font-weight: 100 900;
        font-stretch: 62.5% 100%;
        font-style: normal;
        font-display: swap;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --bg: #12141a;
        --surface: #1c2028;
        --panel: #252a34;
        --accent: #5b8cff;
        --accent-hover: #7aa3ff;
        --text: #e8eaed;
        --muted: #9aa3af;
        --border: rgba(255, 255, 255, 0.08);
        --toolbar-h: 52px;
        --sidebar-w: 280px;
        font-family: 'Segoe UI', system-ui, sans-serif;
      }

      body {
        background: var(--bg);
        color: var(--text);
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      #toolbar {
        height: var(--toolbar-h);
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 14px;
        flex-shrink: 0;
      }

      .brand {
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.08em;
        color: var(--accent);
        margin-right: 12px;
        text-transform: uppercase;
      }

      .btn {
        height: 32px;
        padding: 0 12px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        font-size: 12px;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .btn:hover {
        border-color: rgba(255, 255, 255, 0.15);
      }

      .btn.primary {
        background: var(--accent);
        border-color: var(--accent);
        color: #0b1020;
        font-weight: 600;
      }

      .btn.primary:hover {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
      }

      .btn:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      .btn.toggle.active {
        background: rgba(91, 140, 255, 0.18);
        border-color: var(--accent);
        color: var(--accent-hover);
        font-weight: 700;
      }

      .sep {
        width: 1px;
        height: 22px;
        background: var(--border);
        margin: 0 4px;
      }

      #page-nav {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 8px;
      }

      #page-info {
        font-size: 12px;
        color: var(--muted);
        min-width: 72px;
        text-align: center;
      }

      #app-body {
        flex: 1;
        display: flex;
        min-height: 0;
      }

      #sidebar {
        width: var(--sidebar-w);
        background: var(--surface);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        overflow: hidden;
      }

      .section {
        padding: 14px;
        border-bottom: 1px solid var(--border);
      }

      .section.hidden {
        display: none;
      }

      .mode-row {
        display: flex;
        gap: 8px;
      }

      .mode-row .btn {
        flex: 1;
        justify-content: center;
      }

      .label {
        font-size: 10px;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 8px;
      }

      .row label {
        font-size: 12px;
        color: var(--muted);
        width: 40px;
        flex-shrink: 0;
      }

      select,
      input[type='number'] {
        flex: 1;
        min-width: 0;
        height: 30px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 5px;
        color: var(--text);
        font-size: 12px;
        padding: 0 8px;
        outline: none;
      }

      input[type='range'] {
        flex: 1;
      }

      #font-size-num {
        width: 52px;
        flex: none;
        text-align: center;
      }

      .palette {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
      }

      .swatch {
        width: 22px;
        height: 22px;
        border-radius: 4px;
        border: 2px solid transparent;
        cursor: pointer;
      }

      .swatch.selected {
        border-color: var(--text);
      }

      .custom-color {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-top: 8px;
      }

      input[type='color'] {
        width: 32px;
        height: 32px;
        border: none;
        padding: 0;
        background: transparent;
        cursor: pointer;
      }

      #annotations-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        padding: 10px;
      }

      #annotations-list {
        flex: 1;
        overflow-y: auto;
        margin-top: 8px;
      }

      .ann-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px;
        border-radius: 6px;
        border: 1px solid transparent;
        cursor: pointer;
        font-size: 12px;
      }

      .ann-row:hover {
        background: rgba(255, 255, 255, 0.04);
        border-color: var(--border);
      }

      .ann-row.active {
        background: rgba(91, 140, 255, 0.12);
        border-color: var(--accent);
      }

      .ann-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }

      .ann-label {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .ann-del {
        border: none;
        background: none;
        color: var(--muted);
        cursor: pointer;
        padding: 2px 6px;
        opacity: 0;
      }

      .ann-row:hover .ann-del {
        opacity: 1;
      }

      .ann-del:hover {
        color: #f87171;
      }

      #canvas-area {
        flex: 1;
        position: relative;
        overflow: auto;
        background: var(--bg);
        padding: 28px;
      }

      #drop-hint {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: var(--muted);
        pointer-events: none;
        text-align: center;
        padding: 24px;
      }

      #drop-hint.hidden {
        display: none;
      }

      #canvas-stack {
        position: relative;
        margin: 0 auto;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
        display: none;
      }

      #canvas-stack.visible {
        display: block;
      }

      #pdf-canvas {
        display: block;
      }

      #overlay-canvas {
        position: absolute;
        left: 0;
        top: 0;
        cursor: crosshair;
      }

      #inline-input {
        position: absolute;
        z-index: 10;
        display: none;
        min-width: 40px;
        max-width: min(560px, 90vw);
        padding: 2px 6px;
        border: none;
        outline: none;
        /* background, color, shadows set in JS for contrast with selected ink */
      }

      #zoom-stack {
        position: fixed;
        bottom: 88px;
        right: 24px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        z-index: 20;
      }

      .zoom-btn {
        width: 36px;
        height: 36px;
        border-radius: 8px;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
      }

      .zoom-btn:hover {
        background: var(--panel);
      }

      #zoom-pct {
        font-size: 11px;
        color: var(--muted);
        text-align: center;
      }

      #status {
        height: 26px;
        flex-shrink: 0;
        background: var(--panel);
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 14px;
        gap: 16px;
        font-size: 11px;
        color: var(--muted);
      }

      #status strong {
        color: var(--text);
        font-weight: 500;
      }

      body.drag-target #canvas-area {
        outline: 2px dashed var(--accent);
        outline-offset: -6px;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }

      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 3px;
      }
    </style>
  </head>
  <body>
    <input
      type="file"
      id="pdf-file-input"
      accept=".pdf,application/pdf"
      hidden
      aria-hidden="true"
    />
    <header id="toolbar">
      <span class="brand">Annotator</span>
      <button type="button" class="btn primary" id="btn-open">Open PDF</button>
      <button type="button" class="btn" id="btn-save" disabled>Save PDF</button>
      <span class="sep"></span>
      <div id="page-nav">
        <button type="button" class="btn" id="btn-prev" disabled>&larr;</button>
        <span id="page-info">—</span>
        <button type="button" class="btn" id="btn-next" disabled>&rarr;</button>
      </div>
    </header>

    <div id="app-body">
      <aside id="sidebar">
        <div class="section" id="section-mode">
          <div class="label">Mode</div>
          <div class="mode-row">
            <button type="button" class="btn toggle active" id="mode-text" title="Add text annotations">
              Text
            </button>
            <button type="button" class="btn toggle" id="mode-pen" title="Draw with the pen">
              Pen
            </button>
          </div>
        </div>
        <div class="section" id="section-text-style">
          <div class="label">Text style</div>
          <div class="row">
            <label for="font-select">Font</label>
            <select id="font-select"></select>
          </div>
          <div class="row">
            <label for="font-size-num">Size</label>
            <input type="number" id="font-size-num" min="6" max="200" value="14" />
            <input type="range" id="font-size-range" min="6" max="72" value="14" />
          </div>
          <div class="row">
            <label for="btn-bold">Weight</label>
            <button
              type="button"
              class="btn toggle"
              id="btn-bold"
              aria-pressed="false"
              title="Bold (700)"
            >
              Bold
            </button>
          </div>
        </div>
        <div class="section hidden" id="section-pen-style">
          <div class="label">Pen</div>
          <div class="row">
            <label for="pen-width-num">Width</label>
            <input type="number" id="pen-width-num" min="1" max="48" value="2" step="1" />
            <input type="range" id="pen-width-range" min="1" max="24" value="2" />
          </div>
          <p style="font-size: 11px; color: var(--muted); margin-top: 6px; line-height: 1.4">
            Line color uses <strong style="color: var(--text); font-weight: 500">Color</strong> below.
            Hold <strong style="color: var(--text); font-weight: 500">Shift</strong> to chain several strokes into
            one annotation; release Shift to save.
          </p>
        </div>
        <div class="section">
          <div class="label">Color</div>
          <div class="palette" id="palette"></div>
          <div class="custom-color">
            <input type="color" id="color-picker" value="#000000" />
            <span id="hex-label" style="font-family: ui-monospace, monospace; font-size: 12px">#000000</span>
          </div>
        </div>
        <div id="annotations-panel">
          <div class="label">Annotations (<span id="ann-count">0</span>)</div>
          <div id="annotations-list"></div>
        </div>
      </aside>

      <main id="canvas-area">
        <div id="drop-hint">
          <div style="font-size: 18px; font-weight: 600; color: var(--text)">Open a PDF</div>
          <div>Use <strong>Open PDF</strong> or drag a file here</div>
        </div>
        <div id="canvas-stack">
          <canvas id="pdf-canvas"></canvas>
          <canvas id="overlay-canvas"></canvas>
          <input type="text" id="inline-input" dir="auto" autocomplete="off" spellcheck="true" />
        </div>
        <div id="zoom-stack">
          <button type="button" class="zoom-btn" id="zoom-in" title="Zoom in">+</button>
          <button type="button" class="zoom-btn" id="zoom-out" title="Zoom out">&minus;</button>
          <button type="button" class="zoom-btn" id="zoom-reset" title="100%" style="font-size: 12px">1:1</button>
          <div id="zoom-pct">100%</div>
        </div>
      </main>
    </div>

    <footer id="status">
      <span>File: <strong id="st-file">—</strong></span>
      <span>Coords (PDF): <strong id="st-coords">—</strong></span>
    </footer>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
